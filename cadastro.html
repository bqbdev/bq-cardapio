<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitar acesso - BQ Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="brand" href="index.html"><span class="brand-mark">BQ</span><span>BQ Menu</span></a>
      <h1>Solicite acesso</h1>
      <p>Envie os dados do estabelecimento. O acesso ao painel depende da aprovacao da equipe.</p>
      <form id="signup-request-form" class="form-grid">
        <label>Nome do estabelecimento<input name="nomeEstabelecimento" required></label>
        <label>Nome do responsavel<input name="responsavel" required></label>
        <label>WhatsApp<input name="whatsapp" required inputmode="tel" placeholder="11999999999"></label>
        <label>E-mail<input name="email" required type="email"></label>
        <label>CNPJ ou CPF<input name="documento" required></label>
        <label>Cidade<input name="cidade" required></label>
        <label>Endereco do estabelecimento<input name="estabelecimentoEndereco" required></label>
        <label>Numero<input name="estabelecimentoNumero" required></label>
        <label>Bairro<input name="estabelecimentoBairro" required></label>
        <label>CEP<input name="estabelecimentoCep" inputmode="numeric"></label>
        <label class="full">Complemento<input name="estabelecimentoComplemento"></label>
        <label>Latitude do estabelecimento<input name="estabelecimentoLatitude" type="number" step="0.000001"></label>
        <label>Longitude do estabelecimento<input name="estabelecimentoLongitude" type="number" step="0.000001"></label>
        <button id="signup-geocode" class="btn btn-small full" type="button">Buscar coordenadas pelo endereco</button>
        <button id="signup-location" class="btn btn-small full" type="button">Usar localizacao atual do estabelecimento</button>
        <label>Segmento
          <select name="segmento" required>
            <option value="">Selecione</option>
            <option>Lanchonete</option><option>Restaurante</option><option>Pizzaria</option><option>Hamburgueria</option><option>Cafeteria</option><option>Doceria</option><option>Outros</option>
          </select>
        </label>
        <label class="full">Observacao<textarea name="observacao" rows="3"></textarea></label>
        <button class="btn btn-primary full" type="submit">Enviar cadastro</button>
      </form>
      <p id="signup-message" class="form-message" role="status"></p>
    </section>
  </main>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
