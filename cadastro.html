<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solicitar acesso - bq menu</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <meta property="og:site_name" content="bq menu">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Solicitar acesso - bq menu">
  <meta property="og:description" content="Solicite acesso ao cardápio digital e painel de gestão bq menu.">
  <meta property="og:image" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <meta property="og:image:secure_url" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel">
      <a class="brand" href="index.html"><span class="brand-mark">bq</span><span>bq menu</span></a>
      <h1>Solicite acesso</h1>
      <p>Envie os dados do estabelecimento. O acesso ao painel depende da aprovação da equipe.</p>
      <form id="signup-request-form" class="form-grid">
        <label>Nome do estabelecimento<input name="nomeEstabelecimento" required></label>
        <label>Nome do responsavel<input name="responsavel" required></label>
        <label>WhatsApp<input name="whatsapp" required inputmode="tel" placeholder="11999999999"></label>
        <label>E-mail<input name="email" required type="email"></label>
        <label>CNPJ ou CPF<input name="documento" required></label>
        <label>Cidade<input name="cidade" required></label>
        <label>Endereço do estabelecimento<input name="estabelecimentoEndereco" required></label>
        <label>Número<input name="estabelecimentoNumero" required></label>
        <label>Bairro<input name="estabelecimentoBairro" required></label>
        <label>CEP<input name="estabelecimentoCep" inputmode="numeric"></label>
        <label class="full">Complemento<input name="estabelecimentoComplemento"></label>
        <input name="estabelecimentoLatitude" type="hidden">
        <input name="estabelecimentoLongitude" type="hidden">
        <label>Segmento
          <select name="segmento" required>
            <option value="">Selecione</option>
            <option>Lanchonete</option><option>Restaurante</option><option>Pizzaria</option><option>Hamburgueria</option><option>Cafeteria</option><option>Doceria</option><option>Outros</option>
          </select>
        </label>
        <label class="full">Observação<textarea name="observacao" rows="3"></textarea></label>
        <button class="btn btn-primary full" type="submit">Enviar cadastro</button>
      </form>
      <p id="signup-message" class="form-message" role="status"></p>
    </section>
  </main>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth.js?v=sem-coordenadas-cadastro-1"></script>
</body>
</html>
