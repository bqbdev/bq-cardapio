<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cardápio - BQ Menu</title>
  <link rel="stylesheet" href="style.css?v=webapp-layout-15">
</head>
<body class="menu-page">
  <header class="menu-header">
    <div id="menu-logo" class="menu-logo">BQ</div>
    <div class="menu-info">
      <p class="eyebrow">Cardápio digital</p>
      <h1 id="menu-business-name">Carregando...</h1>
      <p id="menu-message">Escolha seus itens e finalize pelo WhatsApp.</p>
      <div id="menu-hours" class="menu-hours"></div>
    </div>
    <div class="menu-actions">
      <button id="menu-search-shortcut" class="menu-icon-button" type="button" aria-label="Buscar produtos">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10.8 18a7.2 7.2 0 1 1 0-14.4 7.2 7.2 0 0 1 0 14.4Zm5.2-1.7 4.1 4.1"/></svg>
      </button>
      <button id="menu-cart-shortcut" class="menu-icon-button cart-shortcut" type="button" aria-label="Ver carrinho">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 5h2l2 10h9l2-7H7"/><path d="M9 20h.1M17 20h.1"/></svg>
        <span id="menu-cart-count">0</span>
      </button>
    </div>
  </header>
  <main class="menu-shell">
    <section>
      <section id="menu-hero" class="menu-hero"></section>
      <div id="category-tabs" class="category-tabs"></div>
      <div id="menu-products" class="menu-products"></div>
    </section>
    <aside class="cart-panel">
      <h2>Seu pedido</h2>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-total"><span>Total</span><strong id="cart-total">R$ 0,00</strong></div>
      <button id="checkout-open" class="btn btn-primary full">Finalizar pedido</button>
      <div class="client-orders-box">
        <h3>Acompanhar pedido</h3>
        <p>Entre com seu WhatsApp para ver o andamento.</p>
        <form id="client-login-form" class="client-login-form">
          <input name="whatsapp" inputmode="tel" placeholder="Seu WhatsApp">
          <button class="btn btn-small full" type="submit">Entrar</button>
        </form>
        <div id="client-orders-list" class="client-orders-list"></div>
      </div>
    </aside>
  </main>

  <dialog id="checkout-dialog" class="checkout-dialog">
    <form id="checkout-form" class="form-grid">
      <div class="dialog-heading full"><h2>Finalização</h2><button type="button" id="checkout-close" class="icon-button">x</button></div>
      <label class="full">WhatsApp<input name="whatsapp" required inputmode="tel" placeholder="11999999999"></label>
      <p id="client-lookup-message" class="form-message full"></p>
      <label>Nome<input name="nome" required></label>
      <label>Cidade<input name="cidade"></label>
      <label>Endereço<input name="endereco"></label>
      <label>Número<input name="numero"></label>
      <label>Complemento<input name="complemento"></label>
      <label>Bairro<input name="bairro" list="delivery-neighborhoods" autocomplete="address-level3"></label>
      <datalist id="delivery-neighborhoods"></datalist>
      <label class="full">Referência<input name="referencia"></label>
      <label>Tipo
        <select name="tipoEntrega" id="delivery-type" required></select>
      </label>
      <div id="delivery-location-panel" class="delivery-location-panel full hidden">
        <p id="delivery-fee-message" class="form-message"></p>
      </div>
      <label>Pagamento
        <select name="formaPagamento" id="payment-method" required>
          <option>PIX</option>
          <option>Cartão de crédito</option>
          <option>Cartão de débito</option>
          <option>Dinheiro</option>
        </select>
      </label>
      <label id="change-field" class="full hidden">Troco para quanto?<input name="trocoPara" type="number" step="0.01"></label>
      <label class="full">Observação geral<textarea name="observacao" rows="3"></textarea></label>
      <button class="btn btn-primary full" type="submit">Salvar e enviar pelo WhatsApp</button>
      <p id="checkout-message" class="form-message full"></p>
    </form>
  </dialog>
  <dialog id="product-dialog" class="checkout-dialog product-dialog">
    <form id="product-builder-form" class="form-grid">
      <div class="dialog-heading full"><h2 id="builder-title">Montar produto</h2><button type="button" id="product-dialog-close" class="icon-button">x</button></div>
      <p id="builder-subtitle" class="builder-subtitle full"></p>
      <div id="builder-body" class="full product-builder-body"></div>
      <div id="builder-summary" class="builder-summary full"></div>
      <label class="full">Observação do item<input name="observacao" placeholder="Ex: sem cebola, ponto da carne..."></label>
      <div class="builder-total full"><span>Total do item</span><strong id="builder-total">R$ 0,00</strong></div>
      <button class="btn btn-primary full" type="submit">Adicionar ao carrinho</button>
      <p id="builder-message" class="form-message full"></p>
    </form>
  </dialog>
  <script type="module" src="cardapio.js?v=whatsapp-msg-layout-2"></script>
</body>
</html>
