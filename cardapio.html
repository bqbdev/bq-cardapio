<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cardapio - BQ Menu</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="menu-page">
  <header class="menu-header">
    <div id="menu-logo" class="menu-logo">BQ</div>
    <div>
      <p class="eyebrow">Cardapio digital</p>
      <h1 id="menu-business-name">Carregando...</h1>
      <p id="menu-message">Escolha seus itens e finalize pelo WhatsApp.</p>
    </div>
  </header>
  <main class="menu-shell">
    <section>
      <div id="category-tabs" class="category-tabs"></div>
      <div id="menu-products" class="menu-products"></div>
    </section>
    <aside class="cart-panel">
      <h2>Carrinho</h2>
      <div id="cart-items" class="cart-items"></div>
      <div class="cart-total"><span>Total</span><strong id="cart-total">R$ 0,00</strong></div>
      <button id="checkout-open" class="btn btn-primary full">Finalizar pedido</button>
    </aside>
  </main>

  <dialog id="checkout-dialog" class="checkout-dialog">
    <form id="checkout-form" class="form-grid">
      <div class="dialog-heading full"><h2>Finalizacao</h2><button type="button" id="checkout-close" class="icon-button">x</button></div>
      <label class="full">WhatsApp<input name="whatsapp" required inputmode="tel" placeholder="11999999999"></label>
      <button id="lookup-client" type="button" class="btn btn-small full">Buscar cadastro pelo WhatsApp</button>
      <label>Nome<input name="nome" required></label>
      <label>Cidade<input name="cidade"></label>
      <label>Endereco<input name="endereco"></label>
      <label>Numero<input name="numero"></label>
      <label>Complemento<input name="complemento"></label>
      <label>Bairro<input name="bairro"></label>
      <label class="full">Referencia<input name="referencia"></label>
      <label>Tipo
        <select name="tipoEntrega" required>
          <option>Retirada</option>
          <option>Consumo no local</option>
          <option>Entrega propria do estabelecimento</option>
          <option disabled>Delivery pela plataforma - Em breve na plataforma</option>
        </select>
      </label>
      <label>Pagamento
        <select name="formaPagamento" id="payment-method" required>
          <option>PIX</option>
          <option>Cartao de credito</option>
          <option>Cartao de debito</option>
          <option>Dinheiro</option>
        </select>
      </label>
      <label id="change-field" class="full hidden">Troco para quanto?<input name="trocoPara" type="number" step="0.01"></label>
      <label class="full">Observacao geral<textarea name="observacao" rows="3"></textarea></label>
      <button class="btn btn-primary full" type="submit">Salvar e enviar pelo WhatsApp</button>
      <p id="checkout-message" class="form-message full"></p>
    </form>
  </dialog>
  <script type="module" src="cardapio.js"></script>
</body>
</html>
