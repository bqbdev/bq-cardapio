<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Entrar - bq menu</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <meta property="og:site_name" content="bq menu">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Entrar - bq menu">
  <meta property="og:description" content="Acesse o painel do bq menu.">
  <meta property="og:image" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <meta property="og:image:secure_url" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel compact">
      <a class="brand" href="index.html"><span class="brand-mark">bq</span><span>bq menu</span></a>
      <h1>Acessar painel</h1>
      <p>Entre como admin geral ou estabelecimento aprovado.</p>
      <form id="login-form" class="form-grid">
        <label class="full">E-mail<input name="email" type="email" required></label>
        <label class="full">Senha
          <span class="password-field">
            <input name="password" type="password" required>
            <button class="password-toggle" type="button" data-toggle-password>Mostrar</button>
          </span>
        </label>
        <button class="btn btn-primary full" type="submit">Entrar</button>
      </form>
      <p id="login-message" class="form-message" role="status"></p>
      <a class="muted-link" href="cadastro.html">Ainda não tem acesso? Solicite cadastro</a>
    </section>
  </main>
  <script type="module" src="firebase.js"></script>
  <script type="module" src="auth.js"></script>
</body>
</html>
