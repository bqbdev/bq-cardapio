<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Ativar conta - bq menu</title>
  <link rel="icon" type="image/png" href="logo.png">
  <link rel="apple-touch-icon" href="logo.png">
  <meta property="og:site_name" content="bq menu">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Ativar conta - bq menu">
  <meta property="og:description" content="Ative sua conta do painel bq menu.">
  <meta property="og:image" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <meta property="og:image:secure_url" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:image" content="https://bqbdev.github.io/bq-cardapio/logo.png">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-panel compact">
      <a class="brand" href="index.html"><span class="brand-mark">bq</span><span>bq menu</span></a>
      <h1>Ativar conta</h1>
      <p id="activation-intro">Crie sua senha para acessar o painel do estabelecimento.</p>
      <form id="activation-form" class="form-grid">
        <label class="full">E-mail<input name="email" type="email" required readonly></label>
        <label class="full">Senha
          <span class="password-field">
            <input name="password" type="password" required minlength="6" autocomplete="new-password">
            <button class="password-toggle" type="button" data-toggle-password>Mostrar</button>
          </span>
        </label>
        <label class="full">Repita a senha
          <span class="password-field">
            <input name="passwordConfirm" type="password" required minlength="6" autocomplete="new-password">
            <button class="password-toggle" type="button" data-toggle-password>Mostrar</button>
          </span>
        </label>
        <button class="btn btn-primary full" type="submit">Ativar minha conta</button>
      </form>
      <p id="activation-message" class="form-message" role="status"></p>
      <a class="muted-link" href="login.html">Ja ativei minha conta</a>
    </section>
  </main>
  <script type="module" src="ativar.js?v=ativacao-botao-senhas-1"></script>
</body>
</html>
